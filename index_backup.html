<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent DAM | HS Ad</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <!-- 새로운 중앙 정렬 헤더 구조 -->
            <img src="https://storage.googleapis.com/hsad-final-assets-v2/hsad.png" alt="HS Ad Logo" class="logo">
            <h1>Intelligent Digital Asset Management</h1>
            <p class="subtitle">AI-Powered Metadata & Semantic Search Platform</p>
        </header>

        <main class="app-main">
            <div class="card" id="upload-section">
                <div class="card-header">
                    <span class="icon">🚀</span>
                    <h2>Asset Ingestion</h2>
                </div>
                <p>이미지를 업로드하면 AI가 분석하여 모든 정보를 자동으로 생성하고 저장합니다.</p>
                <input type="file" id="upload-file-input" accept="image/*" hidden>
                <button id="select-button" class="primary-button">PC에서 이미지 선택...</button>
                <div id="preview-area" class="hidden">
                    <div class="image-preview-wrapper">
                       <img id="image-preview" src="#" alt="Image Preview">
                    </div>
                    <button id="upload-button" class="action-button" disabled>AI 분석 및 저장 실행</button>
                </div>
            </div>

            <div class="card" id="search-section">
                <div class="card-header">
                    <span class="icon">💡</span>
                    <h2>Semantic Search</h2>
                </div>
                <p>제품명, 색상, 컨셉 등 AI가 생성한 모든 정보로 자산을 검색합니다.</p>
                <div class="search-bar">
                    <input type="text" id="text-query" placeholder="예: 스마트홈, 신혼가전, 레드">
                    <button id="text-search-button" class="primary-button">검색</button>
                </div>
            </div>
        </main>
        
        <div id="status-area"></div>

        <section id="results-section" class="hidden">
            <div class="results-header">
                <h2>AI 분석 결과</h2>
            </div>
            <div id="results-grid"></div>
        </section>

        <footer class="app-footer">
            <!-- 구글 클라우드 로고 추가 -->
            <div class="footer-logos">
                <img src="https://storage.googleapis.com/hsad-final-assets-v2/google%20cloud.png" alt="Google Cloud Logo" class="google-cloud-logo">
            </div>
            <p>© 2025 HS Ad. All Rights Reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
